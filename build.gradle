plugins {
	id 'fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	exclusiveContent {
		forRepository {
			maven {
				name = "Modrinth"
				url = "https://api.modrinth.com/maven"
			}
		}
		filter {
			includeGroup "maven.modrinth"
		}
	}
	maven {
		name = "Greenhouse Maven"
		url = 'https://maven.greenhouse.lgbt/releases/'
	}
	maven {
		name = "Greenhouse Maven"
		url = 'https://maven.greenhouse.lgbt/snapshots/' // Porting Lib Hotfixes
	}
	maven { url "https://mvn.devos.one/releases/" }
	maven {
		url "https://maven.jamieswhiteshirt.com/libs-release"
		content {
			includeGroup "com.jamieswhiteshirt"
		}
	}
	maven {
		url "https://jitpack.io/" // Fabric ASM
		content {
			excludeGroup "io.github.fabricators_of_create"
		}
	}
	exclusiveContent {
		forRepository {
			maven {
				name = "Cassian's Maven"
				url = uri("https://maven.cassian.cc")
			}
		}
		filter {
			includeGroupAndSubgroups("cc.cassian")
		}
	}
	maven { url 'https://repo.sleeping.town/' }
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"mintyblends" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

}

fabricApi {
	configureDataGeneration {
		client = true
		modId = "mintyblends"
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
	include(implementation(annotationProcessor("io.github.llamalad7:mixinextras-fabric:0.2.0-beta.10")))
	modImplementation("cc.cassian.rrv:reliable-recipe-viewer-fabric:${project.rrv_version}+${minecraft_version}") {
		transitive = false
	}
	modCompileOnly "maven.modrinth:eiv:${eiv_version}+${minecraft_version}"
	modImplementation "vectorwing:FarmersDelight:${fdrf_version}+refabricated"
	implementation 'folk.sisby:kaleido-config:0.3.3+1.3.2'
	include 'folk.sisby:kaleido-config:0.3.3+1.3.2'
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

java {
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	inputs.property "archivesName", project.base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}

	repositories {
	}
}